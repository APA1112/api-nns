nelmio_api_doc:
    documentation:
        info:
            title: NNS API
            description: API to manage the database of clients and their tickets about internet incidents
            version: 1.0.0
        components:
            securitySchemas:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
    areas: # to filter documented areas
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
